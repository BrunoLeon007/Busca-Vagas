<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diebold Nixdorf - Oportunidades Internas</title>
    <style>
        :root { --dn-blue: #004a99; --dn-red: #c62127; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('Captura de tela 2025-06-09 144907.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .card { background: white; padding: 30px; border-radius: 4px; width: 90%; max-width: 450px; border-top: 6px solid var(--dn-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h1 { color: var(--dn-blue); font-size: 1.2rem; text-transform: uppercase; margin: 0 0 20px 0; }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-top: 10px; color: #444; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--dn-blue); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; border-radius: 4px; }
        .match { background: #f0fdf4; border-left: 4px solid #22c55e; padding: 10px; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Oportunidade <span style="color:var(--dn-red)">Interna</span></h1>
        
        <label>Nome Completo</label>
        <input type="text" id="nomeCompleto">

        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Setor Atual</label><input type="text" id="setor"></div>
            <div style="flex:1"><label>Data Ingresso</label><input type="date" id="data"></div>
        </div>

        <label>Escolaridade</label>
        <select id="userEsc">
            <option>Ensino Médio</option>
            <option>Graduação</option>
            <option>Pós-Graduação</option>
        </select>

        <label>Cursos (Ex: Excel, Lean)</label>
        <input type="text" id="userCursos">

        <button onclick="buscarVagas()">Consultar Match</button>
        <div id="resultados"></div>
    </div>

    <script>
        function buscarVagas() {
            const nome = document.getElementById('nomeCompleto').value;
            const setor = document.getElementById('setor').value;
            const esc = document.getElementById('userEsc').value;
            const cursos = document.getElementById('userCursos').value.toLowerCase().split(',').map(c => c.trim());

            if(!nome || !setor) return alert("Preencha nome e setor!");

            const vagas = JSON.parse(localStorage.getItem('bancoVagas') || "[]");
            const resDiv = document.getElementById('resultados');
            resDiv.innerHTML = "";

            const matches = vagas.filter(v => {
                return v.escolaridade === esc && v.cursos.every(c => cursos.includes(c));
            });

            if(matches.length > 0) {
                matches.forEach(m => {
                    resDiv.innerHTML += `<div class="match"><strong>Match: ${m.titulo}</strong></div>`;
                    registrarMatch(nome, setor, m.titulo);
                });
                alert("Match encontrado! O RH foi notificado.");
            } else {
                resDiv.innerHTML = "<p style='text-align:center; font-size:0.8rem; margin-top:10px;'>Nenhuma vaga compatível no momento.</p>";
            }
        }

        function registrarMatch(nome, setor, vaga) {
            let matches = JSON.parse(localStorage.getItem('candidatosMatches') || "[]");
            // Evita duplicar o mesmo nome na mesma vaga
            if(!matches.some(m => m.nome === nome && m.vaga === vaga)) {
                matches.push({ nome, setor, vaga, dataMatch: new Date().toLocaleDateString('pt-BR') });
                localStorage.setItem('candidatosMatches', JSON.stringify(matches));
            }
        }
    </script>
</body>
</html>
