<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Encontre sua Oportunidade - Identificação</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1d5cc2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h1 { font-size: 1.5rem; text-align: center; color: var(--primary); }
        .section-title { font-size: 0.9rem; font-weight: bold; text-transform: uppercase; color: #64748b; margin: 20px 0 10px 0; border-bottom: 1px solid #e2e8f0; }
        
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: 600; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 1rem; }
        
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .match { background: #dcfce7; border: 1px solid #22c55e; color: #166534; padding: 12px; margin-bottom: 10px; border-radius: 6px; }
        .no-match { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; padding: 12px; border-radius: 6px; }
        
    </style>
</head>
<body>

    <div class="card">
        
        <h1>Minha Oportunidade Interna</h1>

        <div class="section-title">Dados Pessoais e Profissionais</div>
        
        <label>Nome Completo</label>
        <input type="text" id="nomeCompleto" placeholder="Ex: João Silva">

        <label>Setor Atual</label>
        <input type="text" id="setorAtual" placeholder="Ex: Logística / Vendas">

        <label>Data de Ingresso na Empresa</label>
        <input type="date" id="dataIngresso">

        <label>Nome do Gestor Direto</label>
        <input type="text" id="nomeGestor" placeholder="Nome do seu superior">

        <div class="section-title">Qualificações</div>

        <label>Escolaridade</label>
        <select id="userEsc">
            <option value="Ensino Médio">Ensino Médio</option>
            <option value="Graduação">Graduação</option>
            <option value="Pós-Graduação">Pós-Graduação</option>
        </select>

        <label>Cursos Complementares (separados por vírgula)</label>
        <input type="text" id="userCursos" placeholder="Ex: Inglês, Excel Avançado, Gestão de Tempo">
        
        <button onclick="buscarVagas()">Verificar Disponibilidade de Vagas</button>

        <div id="resultados" class="result-box"></div>
    </div>

    <script>
        function buscarVagas() {
            // Coleta de dados do formulário
            const dadosCandidato = {
                nome: document.getElementById('nomeCompleto').value,
                setor: document.getElementById('setorAtual').value,
                ingresso: document.getElementById('dataIngresso').value,
                gestor: document.getElementById('nomeGestor').value,
                escolaridade: document.getElementById('userEsc').value,
                cursos: document.getElementById('userCursos').value.split(',').map(c => c.trim().toLowerCase())
            };

            // Validação simples
            if(!dadosCandidato.nome || !dadosCandidato.setor) {
                alert("Por favor, preencha seus dados de identificação.");
                return;
            }

            // Busca no "Banco de Dados" (LocalStorage)
            const vagasCadastradas = JSON.parse(localStorage.getItem('bancoVagas') || "[]");
            const containerRes = document.getElementById('resultados');
            
            containerRes.innerHTML = "";
            containerRes.style.display = "block";

            // Lógica de Comparação (Match)
            const matches = vagasCadastradas.filter(vaga => {
                const escolaridadeOk = (vaga.escolaridade === dadosCandidato.escolaridade);
                const cursosOk = vaga.cursos.every(cursoExigido => 
                    dadosCandidato.cursos.includes(cursoExigido)
                );
                return escolaridadeOk && cursosOk;
            });

            if(matches.length > 0) {
                containerRes.innerHTML = `<h3>Olá ${dadosCandidato.nome}, encontramos vagas para você:</h3>`;
                matches.forEach(m => {
                    containerRes.innerHTML += `
                        <div class="match">
                            <strong>✅ ${m.titulo}</strong><br>
                            <small>Setor de destino compatível com seu perfil.</small>
                        </div>`;
                });
            } else {
                containerRes.innerHTML = `
                    <div class="no-match">
                        Poxa ${dadosCandidato.nome}, no momento não há vagas abertas exatamente para o seu nível de escolaridade e cursos.
                    </div>`;
            }
        }
    </script>
</body>

</html>
